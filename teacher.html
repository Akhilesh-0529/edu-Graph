<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduSphære - Teacher Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="glass">
    <div class="logo-container">
      <div class="logo-icon">Ω</div>
      <h1 style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em;">EduSphære</h1>
    </div>
    
    <div style="display: flex; align-items: center; gap: 1.5rem;">
      <div id="role-display-badge" class="role-badge" style="background: var(--accent-glow); border-color: rgba(16, 185, 129, 0.3); color: #a7f3d0;">Teacher Mode</div>
      <button class="btn-primary" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; background: rgba(239, 68, 68, 0.2); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.4); box-shadow: none;" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar">
      <div class="nav-item active" data-target="panel-teacher-actions">
        <span>👨‍🏫</span> Curriculum Hub
      </div>
    </aside>

    <main class="content-area">
      <section id="panel-teacher-actions" class="view-panel active">
        <h2 style="margin-bottom: 1.5rem; font-weight: 700;">Teacher Workspace</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
          <!-- Left: Material ingestion -->
          <div class="glass" style="padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem; font-weight: 600;">Ingest Course Material</h3>
            <div style="border: 2px dashed var(--border-card); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer;" id="drag-drop-zone">
              <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
              <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;">Click or drag PDF, DOCX, or TXT curriculum files</p>
              <input type="file" id="file-uploader" style="display: none;" accept=".txt,.pdf">
              <button class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="document.getElementById('file-uploader').click()">Choose File</button>
            </div>
            <div style="margin-top: 1rem;" id="ingested-documents-list">
              <h4 style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Ingested Context Sources:</h4>
              <div style="font-size: 0.85rem; padding: 0.5rem; background: rgba(255,255,255,0.02); border-radius: 6px; border: 1px solid var(--border-card); margin-bottom: 0.5rem;">
                📄 limits_and_calculus_ch1.txt (Vectorized, 24 Concepts mapped)
              </div>
            </div>
          </div>

          <!-- Right: Escalated Questions -->
          <div class="glass" style="padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem; font-weight: 600;">Escalated Student Queries</h3>
            <div id="escalated-questions-list" style="display: flex; flex-direction: column; gap: 1rem;">
              <!-- Dynamic escalations load here -->
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    // Load dynamic escalated questions from shared database storage
    function loadEscalations() {
      const container = document.getElementById("escalated-questions-list");
      if (!container) return;
      container.innerHTML = "";
      
      const saved = localStorage.getItem("edusphere_escalated_questions");
      const escalations = saved ? JSON.parse(saved) : [];
      
      if (escalations.length === 0) {
        container.innerHTML = `<div style="font-size: 0.9rem; color: var(--text-secondary); font-style: italic;">No pending student escalations currently in queue.</div>`;
        return;
      }
      
      escalations.forEach((item, index) => {
        const itemEl = document.createElement("div");
        itemEl.className = "glass";
        itemEl.style.padding = "1rem";
        itemEl.style.background = "rgba(255,255,255,0.02)";
        itemEl.style.border = "1px solid rgba(245, 158, 11, 0.2)";
        itemEl.innerHTML = `
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span class="role-badge" style="font-size: 0.65rem; color: var(--warning); border-color: var(--warning);">Pending Review</span>
            <span style="font-size: 0.75rem; color: var(--text-secondary);">Asked by: Student</span>
          </div>
          <p style="font-size: 0.9rem; margin-bottom: 0.75rem;">"${item.question}"</p>
          <div style="display: flex; gap: 0.5rem;">
            <button class="btn-primary" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; background: var(--accent); box-shadow: none;" onclick="resolveSharedEscalation(${index})">Approve Response</button>
            <button class="btn-primary" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; background: transparent; border: 1px solid var(--border-card); color: var(--text-primary); box-shadow: none;" onclick="resolveSharedEscalation(${index}, true)">Manual Answer</button>
          </div>
        `;
        container.appendChild(itemEl);
      });
    }

    window.resolveSharedEscalation = function(index, manual = false) {
      const saved = localStorage.getItem("edusphere_escalated_questions");
      const escalations = saved ? JSON.parse(saved) : [];
      if (index > -1 && index < escalations.length) {
        const resolvedItem = escalations.splice(index, 1)[0];
        localStorage.setItem("edusphere_escalated_questions", JSON.stringify(escalations));
        
        // Add to historical answers
        const chatSaved = localStorage.getItem("edusphere_chat_history");
        const chatMessages = chatSaved ? JSON.parse(chatSaved) : [];
        chatMessages.push({
          sender: "assistant",
          text: `[Teacher Resolved Answer] <br><br>Question: "${resolvedItem.question}"<br><br>${manual ? "A manual tutor response is being processed." : "The AI's generated response has been verified and approved by the course instructor."}`
        });
        localStorage.setItem("edusphere_chat_history", JSON.stringify(chatMessages));
        
        alert("Escalated question resolved successfully.");
        loadEscalations();
      }
    };

    // Initialize escalations list
    loadEscalations();
  </script>
</body>
</html>
